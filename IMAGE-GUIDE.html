<!-- 
===============================================
📸 ব্লগ পোস্টে Image ব্যবহারের গাইড
===============================================

Images খুব গুরুত্বপূর্ণ! নিচে দেখুন কিভাবে সুন্দর caption সহ image যোগ করবেন।
-->

<!-- 
====================
সাধারণ Image
====================
-->
<figure>
    <img src="../assets/image/your-image.png" alt="Image বর্ণনা">
    <figcaption>এখানে image এর caption লিখুন</figcaption>
</figure>

<!-- 
====================
Screenshot Image
====================
Screenshot এর জন্য বিশেষ স্টাইল পাওয়ার জন্য "screenshot" class যোগ করুন
-->
<figure class="screenshot">
    <img src="../assets/image/screenshot.png" alt="Screenshot বর্ণনা">
    <figcaption>
        <strong>চিত্র ১:</strong> Nmap scan results দেখাচ্ছে যে port 80 খোলা আছে
    </figcaption>
</figure>

<!-- 
====================
বাংলা-ইংরেজি Caption
====================
Bilingual পোস্টের জন্য:
-->
<figure class="screenshot">
    <img src="../assets/image/vulnerability.png" alt="XSS Vulnerability">
    <figcaption>
        <strong data-bn="চিত্র ২:" data-en="Figure 2:">চিত্র ২:</strong>
        <span data-bn="XSS দুর্বলতা আবিষ্কার করার মুহূর্ত" data-en="The moment of discovering XSS vulnerability">
            XSS দুর্বলতা আবিষ্কার করার মুহূর্ত
        </span>
    </figcaption>
</figure>

<!-- 
====================
একাধিক Image পাশাপাশি
====================
দুটি image পাশাপাশি দেখাতে চাইলে:
-->
<div class="row">
    <div class="col-md-6">
        <figure>
            <img src="../assets/image/before.png" alt="Before">
            <figcaption>
                <span data-bn="আগে" data-en="Before">আগে</span>
            </figcaption>
        </figure>
    </div>
    <div class="col-md-6">
        <figure>
            <img src="../assets/image/after.png" alt="After">
            <figcaption>
                <span data-bn="পরে" data-en="After">পরে</span>
            </figcaption>
        </figure>
    </div>
</div>

<!-- 
====================
Image Placeholder
====================
যদি আপনার কাছে এখনো image না থাকে, তাহলে placeholder ব্যবহার করুন:
-->
<figure>
    <img src="https://via.placeholder.com/800x400/1a1a2e/4ade80?text=Your+Screenshot+Here" alt="Placeholder">
    <figcaption>এখানে আপনার screenshot থাকবে</figcaption>
</figure>

<!-- 
====================
টিপস:
====================
1. সবসময় alt text দিন (SEO এর জন্য ভালো)
2. Screenshot এর জন্য .png ফরম্যাট ব্যবহার করুন
3. Photo এর জন্য .jpg ব্যবহার করুন
4. Image সাইজ 1000px এর বেশি না রাখাই ভালো
5. Caption সংক্ষিপ্ত এবং বোঝা যায় এমন রাখুন
-->
